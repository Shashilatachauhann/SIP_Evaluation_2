<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="write.css">
</head>

<body>
    <div class="write">
        <nav class="navbar">
            <h1 class="logo">Medium</h1>
            <div class="draft">
                <p>Draft</p>
            </div>
            <button class="publish">
                <span>Publish</span>
            </button>
            <div class="content">
                <i class="fa-solid fa-ellipsis"></i>
            </div>
            <div class="bell">
                <i class="fa-regular fa-bell bell"></i>
            </div>
            <div class="profile">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="profile" class="profile">
            </div>
        </nav>
        <div class="story">
            <div class="sec">
                <p>Title</p>
                <div class="tell">
                    <i class="fa-regular fa-square-plus"></i>
                    <div contenteditable="true" class="stry" >
                        Tell your story...
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
